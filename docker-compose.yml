version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrongPassword123!
    ports:
      - "1433:1433"

  ingestion-api:
    build: ./src/IngestionService
    depends_on:
      - rabbitmq
    ports:
      - "5001:8080"

  processing-worker:
    build: ./src/ProcessingService
    depends_on:
      - rabbitmq
      - sqlserver
